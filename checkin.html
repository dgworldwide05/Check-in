<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Church Check-in</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:2rem 1rem}
    .card{background:white;border-radius:16px;padding:2rem;width:100%;max-width:420px;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
    .logo{text-align:center;margin-bottom:1.5rem}
    .logo h1{font-size:22px;color:#111}
    .logo p{font-size:13px;color:#666;margin-top:4px}
    label{font-size:13px;color:#555;display:block;margin-bottom:5px;margin-top:12px}
    input[type=text],input[type=tel],select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none}
    input:focus,select:focus{border-color:#111}
    .type-btns{display:flex;gap:8px;margin-top:6px}
    .type-btn{flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;background:white;font-size:14px;cursor:pointer;text-align:center;transition:all .15s}
    .type-btn.active{background:#111;color:white;border-color:#111}
    .dept-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
    .dept-item{display:flex;align-items:center;gap:8px;font-size:13px;color:#333;background:#f9f9f9;padding:8px 10px;border-radius:8px;border:1px solid #eee;cursor:pointer}
    .dept-item input{width:16px;height:16px;cursor:pointer;accent-color:#111;margin:0}
    .btn{width:100%;padding:12px;background:#111;color:white;border:none;border-radius:8px;font-size:15px;cursor:pointer;margin-top:1.5rem}
    .btn:hover{background:#333}
    .msg{margin-top:1rem;padding:12px;border-radius:8px;font-size:13px;text-align:center;display:none}
    .msg.success{background:#d4edda;color:#155724;display:block}
    .msg.error{background:#f8d7da;color:#721c24;display:block}
    .optional{font-size:11px;color:#999;margin-left:4px}
    .mode-tabs{display:flex;gap:8px;margin-bottom:1.2rem}
    .mode-tab{flex:1;padding:9px;border:1px solid #ddd;border-radius:8px;background:#f9f9f9;font-size:13px;text-align:center;cursor:pointer;color:#555}
    .mode-tab.active{background:#111;color:white;border-color:#111}
  </style>
</head>
<body>
<div class="card" id="signup-card">
  <div class="logo">
    <img src="logo.png" style="width:220px; margin-bottom:0.5rem;" alt="Dwellers Gold Worldwide" />
    <p style="font-size:15px; color:#111; font-weight:bold;">Church Check-in</p>
    <p>Welcome! Please fill in your details below</p>
</div>

  <div class="mode-tabs">
    <div class="mode-tab active" id="tab-signup" onclick="switchMode('signup')">New here?</div>
    <div class="mode-tab" id="tab-id" onclick="switchMode('id')">I've checked in before</div>
  </div>

  <div id="signup-form">
  <label>Full name *</label>
  <input type="text" id="name" placeholder="e.g. Kwame Asante" />

  <label>Phone number *</label>
  <input type="tel" id="phone" placeholder="e.g. 0244123456 or +233244123456" maxlength="13" />

  <label>I am a *</label>
  <div class="type-btns">
    <div class="type-btn active" onclick="selectType('member', this)">Member</div>
    <div class="type-btn" onclick="selectType('visitor', this)">Visitor</div>
  </div>

 <label id="dept-label">Department <span class="optional">(optional — tick all that apply)</span></label>
  <div id="dept-grid" class="dept-grid">
    <label class="dept-item"><input type="checkbox" value="Choir"> Choir</label>
    <label class="dept-item"><input type="checkbox" value="Ushers"> Ushers</label>
    <label class="dept-item"><input type="checkbox" value="Innovation and Technology"> Innovation & Tech</label>
    <label class="dept-item"><input type="checkbox" value="Communion"> Communion</label>
    <label class="dept-item"><input type="checkbox" value="Prayer"> Prayer</label>
    <label class="dept-item"><input type="checkbox" value="Rego"> Rego</label>
  </div>

  <button class="btn" onclick="submitCheckin()">Check in</button>
  </div>

  <div id="id-form" style="display:none">
    <label>Your phone number *</label>
    <input type="tel" id="phone-id-input" placeholder="e.g. 0244123456" maxlength="13" />
    <button class="btn" style="background:#fff;color:#111;border:1px solid #ddd;margin-top:0.6rem" onclick="openScanner()">📷 Scan QR instead</button>
    <button class="btn" onclick="submitIdCheckin()">Check in</button>
    <div id="scanner-wrap" style="display:none;margin-top:1rem">
      <video id="scanner-video" style="width:100%;border-radius:8px"></video>
      <button class="btn" style="background:#fff;color:#111;border:1px solid #ddd;margin-top:0.6rem" onclick="closeScanner()">Cancel scan</button>
    </div>
  </div>

  <div id="msg" class="msg"></div>
</div>

<div id="success-screen" style="display:none; text-align:center; padding:2rem 1rem">
  <div style="font-size:60px; margin-bottom:1rem">🙏</div>
  <h2 style="font-size:22px; color:#111; margin-bottom:0.5rem" id="success-title">You are checked in!</h2>
  <p style="font-size:15px; color:#555; margin-bottom:1.5rem" id="success-sub">God bless you</p>

  <p style="font-size:13px; color:#666; margin-bottom:1.5rem">Use the phone number you signed up with to check in next time.</p>

  <div style="background:#d4edda; border-radius:12px; padding:1rem; font-size:13px; color:#155724;">
    Have a blessed service!
  </div>
</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<script>
  let selectedType = 'member';
  let scannerStream = null;
  let scannerLoopId = null;

  function switchMode(mode) {
    document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
    document.getElementById('tab-id').classList.toggle('active', mode === 'id');
    document.getElementById('signup-form').style.display = mode === 'signup' ? 'block' : 'none';
    document.getElementById('id-form').style.display = mode === 'id' ? 'block' : 'none';
    document.getElementById('msg').className = 'msg';
    closeScanner();
  }

 function selectType(type, btn) {
    selectedType = type;
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const deptGrid = document.getElementById('dept-grid');
    const deptLabel = document.getElementById('dept-label');

    if (type === 'visitor') {
      deptGrid.style.opacity = '0.4';
      deptGrid.style.pointerEvents = 'none';
      deptLabel.innerHTML = 'Department <span class="optional">(not available for visitors)</span>';
      document.querySelectorAll('.dept-grid input').forEach(c => c.checked = false);
    } else {
      deptGrid.style.opacity = '1';
      deptGrid.style.pointerEvents = 'auto';
      deptLabel.innerHTML = 'Department <span class="optional">(optional — tick all that apply)</span>';
    }
  }

  async function submitCheckin() {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
   if (!name) return showMsg('Please enter your name', 'error');
if (!/^[a-zA-Z\s]+$/.test(name)) return showMsg('Please enter a valid name (letters only)', 'error');
    if (!phone) return showMsg('Please enter your phone number', 'error');
const ghanaPhone = /^(\+233|0)[0-9]{9}$/.test(phone);
if (!ghanaPhone) return showMsg('Please enter a valid Ghana phone number e.g. 0244123456 or +233244123456', 'error');

    const departments = [...document.querySelectorAll('.dept-grid input:checked')].map(c => c.value);

    const res = await fetch('/checkin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, phone, type: selectedType, departments })
    });
    const data = await res.json();
    if (data.success) {
      showSuccess({
        title: data.alreadyRegistered ? 'Welcome back!' : 'You are checked in!',
        sub: data.alreadyRegistered ? 'This number was already registered.' : 'God bless you'
      });
    } else {
      showMsg(data.message, 'error');
    }
  }

  async function submitIdCheckin() {
    const phone = document.getElementById('phone-id-input').value.trim();
    if (!phone) return showMsg('Please enter your phone number', 'error');

    const res = await fetch('/checkin/id', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone })
    });
    const data = await res.json();
    if (data.success) {
      showSuccess({
        title: data.alreadyCheckedIn ? `You're already checked in, ${data.name}!` : `Welcome, ${data.name}!`,
        sub: 'God bless you'
      });
    } else {
      showMsg(data.message, 'error');
    }
  }

  async function showSuccess({ title, sub }) {
    document.getElementById('signup-card').style.display = 'none';
    document.getElementById('success-screen').style.display = 'block';
    document.getElementById('success-title').textContent = title;
    document.getElementById('success-sub').textContent = sub;
  }

  function showMsg(text, type) {
    const msg = document.getElementById('msg');
    msg.textContent = text;
    msg.className = 'msg ' + type;
  }

  async function openScanner() {
    document.getElementById('scanner-wrap').style.display = 'block';
    try {
      scannerStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      const video = document.getElementById('scanner-video');
      video.srcObject = scannerStream;
      video.setAttribute('playsinline', true);
      await video.play();

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height);
          if (code && code.data) {
            document.getElementById('phone-id-input').value = code.data.trim();
            closeScanner();
            submitIdCheckin();
            return;
          }
        }
        scannerLoopId = requestAnimationFrame(tick);
      }
      scannerLoopId = requestAnimationFrame(tick);
    } catch (e) {
      showMsg('Could not access camera. Please type your phone number instead.', 'error');
      document.getElementById('scanner-wrap').style.display = 'none';
    }
  }

  function closeScanner() {
    if (scannerLoopId) cancelAnimationFrame(scannerLoopId);
    scannerLoopId = null;
    if (scannerStream) {
      scannerStream.getTracks().forEach(t => t.stop());
      scannerStream = null;
    }
    document.getElementById('scanner-wrap').style.display = 'none';
  }
</script>
</body>
</html>
